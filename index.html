// ─── RUT ──────────────────────────────────────────────────────
function validateRUT(rut) {
  const clean = rut.replace(/[.\-\s]/g,"").toUpperCase();
  if(!/^\d{7,8}[0-9K]$/.test(clean)) return false;
  const body=clean.slice(0,-1), dv=clean.slice(-1);
  let sum=0,mul=2;
  for(let i=body.length-1;i>=0;i--){sum+=parseInt(body[i])*mul;mul=mul===7?2:mul+1;}
  const exp=11-(sum%11);
  return dv===(exp===11?"0":exp===10?"K":String(exp));
}
function liveFormatRUT(raw) {
  const clean=raw.replace(/[^0-9kK]/g,"").toUpperCase();
  if(clean.length<=1) return clean;
  const body=clean.slice(0,-1),dv=clean.slice(-1);
  return body.length>=7?body+"-"+dv:clean;
}
function finalFormatRUT(rut) {
  const clean=rut.replace(/[.\-\s]/g,"").toUpperCase();
  if(clean.length<2) return clean;
  const body=clean.slice(0,-1),dv=clean.slice(-1);
  return body.replace(/\B(?=(\d{3})+(?!\d))/g,".")+"-"+dv;
}
function validateEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(e.trim());}

async function sendTelegram(data) {
  try {
    const tipo = data.tipo_seguro || "seguro";
    const nombre = data.nombre || data.contratante || "";
    const contacto = data.canal === "email" ? "📧 " + data.contacto : "💬 " + data.contacto;

    let detalle = "";
    if (tipo.includes("auto")) {
      detalle = `🚗 ${data.marca} ${data.modelo} ${data.anio} · ${data.patente}\n📍 ${data.comuna}\n🛡️ ${data.cobertura}`;
    } else if (tipo.includes("hogar")) {
      detalle = `🏠 ${[data.calle, data.numero, data.depto, data.comuna].filter(Boolean).join(", ")}\n🔨 ${data.construccion} · ${data.uso} · ${data.tipo}\n💰 Edificio: UF ${data.montoEdificio} · Contenido: UF ${data.montoContenido}`;
    } else if (tipo.includes("contacto ejecutivo")) {
      detalle = "📝 " + data.consulta;
    } else if (tipo.includes("condominio")) {
      detalle = `🏢 ${data.direccion}\n📊 ${data.uso} · ${data.torres} torre(s) · ${data.pisos} pisos · ${data.unidades} uds.\n💰 Esp. comunes: UF ${data.montoEspacios} · Deptos: UF ${data.montoDeptos}`;
    }

    const msg = `🔔 *Nueva cotización Patriva*\n\n👤 ${nombre}\n🪪 ${data.rut}\n📋 ${tipo.toUpperCase()}\n\n${detalle}\n\n${contacto}\n\n🕐 ${data.timestamp}`;

    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: TG_CHAT, text: msg, parse_mode: "Markdown" })
    });
  } catch(e) { console.error("Telegram error:", e); }
}

function StepEjecutivo({onSubmit}){
  const [nombre,setNombre]=useState("");
  const [consulta,setConsulta]=useState("");
  const [canal,setCanal]=useState(null);
  const [contacto,setContacto]=useState("");
  const [wspVal,setWspVal]=useState("");
  const [errors,setErrors]=useState({});

  const validate=()=>{
    const e={};
    if(!nombre.trim()||nombre.trim().split(" ").filter(Boolean).length<2) e.nombre="Ingresa nombre y apellido";
    if(!consulta.trim()) e.consulta="Escribe tu consulta";
    if(!canal) e.canal="Selecciona un canal";
    if(canal==="email"&&!validateEmail(contacto)) e.contacto="Correo no válido";
    if(canal==="whatsapp"&&wspVal.length!==8) e.contacto="Ingresa exactamente 8 dígitos";
    setErrors(e);
    return Object.keys(e).length===0;
  };

  const handleSubmit=()=>{
    if(validate()){
      const full=canal==="email"?contacto:"+569"+wspVal;
      onSubmit({nombre,consulta,canal,contacto:full});
    }
  };

  return <div style={{animation:"fadeUp 0.3s ease"}}>
    <TInput label="Tu nombre completo" placeholder="ej: Juan Pérez González" value={nombre} onChange={setNombre} error={errors.nombre}/>
    <FieldWrap error={errors.consulta}>
      <Lbl>Tu consulta</Lbl>
      <textarea value={consulta} onChange={e=>setConsulta(e.target.value)} placeholder="Escribe tu pregunta o consulta aquí..." rows={3} style={{width:"100%",padding:"9px 12px",background:"#0d0d0d",border:`1px solid ${errors.consulta?C.error:C.border}`,borderRadius:10,color:C.text,fontSize:13,fontFamily:"inherit",outline:"none",resize:"none",lineHeight:1.5,caretColor:"#00c853"}} onFocus={e=>e.target.style.borderColor=C.green} onBlur={e=>e.target.style.borderColor=errors.consulta?C.error:C.border}/>
    </FieldWrap>
    <div style={{color:C.textMid,fontSize:12,marginBottom:10}}>¿Cómo prefieres que te contactemos?</div>
    <div style={{display:"flex",gap:8,marginBottom:14}}>
      {[{id:"email",label:"📧 Email"},{id:"whatsapp",label:"💬 WhatsApp"}].map(c=>(
        <button key={c.id} onClick={()=>{setCanal(c.id);setErrors({});}} style={{flex:1,padding:"10px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,transition:"all 0.2s",border:`1px solid ${canal===c.id?C.green:C.border}`,background:canal===c.id?"rgba(0,200,83,0.15)":"transparent",color:canal===c.id?C.green:C.textDim}}>{c.label}</button>
      ))}
    </div>

    {canal==="whatsapp"&&<WspInput value={wspVal} onChange={v=>{setWspVal(v);setErrors(p=>({...p,contacto:""}));}} error={errors.contacto}/>}
    {errors.canal&&<div style={{color:C.error,fontSize:11,marginBottom:8}}>⚠ {errors.canal}</div>}
    <ActionBtn onClick={handleSubmit} disabled={!nombre.trim()||!consulta.trim()||!canal}>Enviar consulta →</ActionBtn>
  </div>;
}

// ─── MAIN ─────────────────────────────────────────────────────
const App = function App(){
  const [chatLog,setChatLog]=useState([]);
  const [step,setStep]=useState("menu");
  const [quoteData,setQuoteData]=useState({});
  const [quoteType,setQuoteType]=useState(null);
  const [loading,setLoading]=useState(false);
  const [faqInput,setFaqInput]=useState("");
  const bottomRef=useRef(null);

  const pushBot=(c)=>setChatLog(p=>[...p,{role:"bot",content:c}]);
  const pushUser=(c)=>setChatLog(p=>[...p,{role:"user",content:c}]);

  useEffect(()=>{pushBot("¡Hola! Bienvenido/a a **Patriva** 🏠\n\nSoy tu asesor digital de seguros. ¿En qué te puedo ayudar hoy?");},[]);
  useEffect(()=>{setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),80);},[chatLog,step,loading]);

  const go=(s,msg)=>setTimeout(()=>{pushBot(msg);setStep(s);},450);

  const handleMenu=(item)=>{
    pushUser(item.emoji+" "+item.label);setQuoteType(item.id);
    if(item.id==="auto") go("auto_vehiculo","Perfecto 🚗 Empecemos con los datos de tu vehículo:");
    else if(item.id==="hogar") go("hogar_personal","Perfecto 🏠 Empecemos con los datos del **propietario legal** del inmueble:");
    else if(item.id==="condominio") go("cond_contratante","Perfecto 🏢 Empecemos con los datos del **contratante**:");
    else if(item.id==="contacto_ejecutivo") go("ejecutivo","Con gusto te conectamos con un ejecutivo 💬 Cuéntanos tu consulta:");
    else go("ejecutivo","Con gusto te conectamos con un ejecutivo 💬 Primero cuéntanos tu consulta:");
  };

  const onAutoVehiculo=(d)=>{pushUser(`${d.marca} ${d.modelo} ${d.anio} · Patente: ${d.patente}`);setQuoteData(p=>({...p,...d}));go("auto_personal","Ahora los datos del **propietario legal**:");};
  const onAutoPersonal=(d)=>{pushUser(`${d.nombre} · RUT: ${d.rut} · ${d.comuna}`);setQuoteData(p=>({...p,...d}));go("auto_cobertura","¿Qué tipo de cobertura te interesa?");};
  const onAutoCobertura=(o)=>{pushUser(`${o.emoji} ${o.label}`);setQuoteData(p=>({...p,cobertura:o.label}));go("contacto","Casi listo 🎉 ¿Cómo prefieres que te enviemos la cotización?");};

  const onHogarPersonal=(d)=>{pushUser(`${d.nombre} · RUT: ${d.rut}`);setQuoteData(p=>({...p,...d}));go("hogar_direccion","Ahora la **dirección** del inmueble:");};
  const onHogarDireccion=(d)=>{const addr=[d.calle,d.numero,d.depto,d.estacionamiento&&`Est. ${d.estacionamiento}`,d.bodega&&`Bod. ${d.bodega}`,d.comuna].filter(Boolean).join(", ");pushUser(addr);setQuoteData(p=>({...p,...d}));go("hogar_detalle","Detalles del inmueble:");};
  const onHogarDetalle=(d)=>{pushUser(`${d.tipo} · ${d.construccion} · ${d.uso} · ${d.ubicacion} · ${d.pisos} piso(s) · Año: ${d.anio} · Hipotecario: ${d.hipotecario}`);setQuoteData(p=>({...p,...d}));go("hogar_montos","**Montos asegurados** en UF:");};
  const onHogarMontos=(d)=>{pushUser(`Edificio: UF ${d.montoEdificio} · Contenido: UF ${d.montoContenido}`);setQuoteData(p=>({...p,...d}));go("contacto","¿Cómo prefieres que te enviemos la cotización?");};

  const onCondContratante=(d)=>{pushUser(`${d.contratante} · RUT: ${d.rut}`);setQuoteData(p=>({...p,...d}));go("cond_direccion","**Dirección** del condominio:");};
  const onCondDireccion=(d)=>{pushUser(d.direccion);setQuoteData(p=>({...p,...d}));go("cond_detalle","Detalles del condominio:");};
  const onCondDetalle=(d)=>{pushUser(`${d.uso} · Año: ${d.anio} · ${d.torres} torre(s) · ${d.pisos} pisos · ${d.subterraneos} subterráneo(s) · ${d.unidades} uds. · Asc: ${d.ascensores==="Sí"?d.cantAscensores:"No"} · Piscina: ${d.piscina} · Locales: ${d.locales}`);setQuoteData(p=>({...p,...d}));go("cond_seguridad","Medidas de **seguridad** del condominio:");};
  const onCondSeguridad=(d)=>{pushUser(`Seguridad: ${d.medidas}`);setQuoteData(p=>({...p,...d}));go("cond_montos","**Montos asegurados** en UF:");};
  const onCondMontos=(d)=>{pushUser(`Espacios comunes: UF ${d.montoEspacios} · Deptos: UF ${d.montoDeptos}`);setQuoteData(p=>({...p,...d}));go("contacto","¿Cómo prefieres que te enviemos la cotización?");};

  const onContacto=async(data)=>{
    pushUser(data.canal==="email"?`📧 ${data.value}`:`💬 ${data.value}`);
    const firstName=(quoteData.nombre||quoteData.contratante||"").split(" ")[0];
    const tipoLabel=quoteType==="auto"?"seguro de auto":quoteType==="hogar"?"seguro hogar":"seguro condominio";
    const final={...quoteData,tipo_seguro:tipoLabel,canal:data.canal,contacto:data.value,timestamp:new Date().toLocaleString("es-CL")};
    setStep("done");setLoading(true);
    await sendToSheets(final);
    setLoading(false);
    pushBot(`¡Listo${firstName?", "+firstName:""}! ✅\n\nUn ejecutivo de **Patriva** revisará tu solicitud de **${tipoLabel}** y te enviará la cotización al ${data.canal==="email"?"correo":"WhatsApp"} que indicaste.\n\n¡Gracias por confiar en Patriva!`);
  };

    pushUser(`${data.nombre} · ${data.canal==="email"?"📧":"💬"} ${data.contacto}\n"${data.consulta}"`);
    const final={
      tipo_seguro:"contacto ejecutivo",
      nombre:data.nombre,
      consulta:data.consulta,
      canal:data.canal,
      contacto:data.contacto,
      timestamp:new Date().toLocaleString("es-CL")
    };
    setStep("done");setLoading(true);
    await sendToSheets(final);
    setLoading(false);
    pushBot(`¡Gracias, ${data.nombre.split(" ")[0]}! 👍\n\nUn ejecutivo de **Patriva** se pondrá en contacto contigo a la brevedad por ${data.canal==="email"?"correo":"WhatsApp"}.`);
  };

  const handleFaq=async()=>{
    if(!faqInput.trim()) return;
    const q=faqInput.trim();setFaqInput("");pushUser(q);setLoading(true);
    const resp=await callClaude(q);setLoading(false);pushBot(resp);
  };

  const reset=()=>{setChatLog([]);setStep("menu");setQuoteData({});setQuoteType(null);setFaqInput("");setTimeout(()=>pushBot("¡Hola! Bienvenido/a a **Patriva** 🏠\n\nSoy tu asesor digital de seguros. ¿En qué te puedo ayudar hoy?"),80);};

  return <>
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
      *{box-sizing:border-box;margin:0;padding:0;}
      body{background:#0a0a0a;font-family:'DM Sans',sans-serif;}
      input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}

      @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px}
      input::placeholder{color:#3a3a3a}input{caret-color:#00c853}
    `}</style>

    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"#0a0a0a"}}>
      <div style={{width:"100%",maxWidth:430,height:"88vh",maxHeight:720,background:C.surface,borderRadius:24,border:`1px solid ${C.border}`,boxShadow:`0 30px 80px rgba(0,0,0,0.8),0 0 40px rgba(0,200,83,0.04)`,display:"flex",flexDirection:"column",overflow:"hidden"}}>

        {/* HEADER */}

          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${C.green},${C.greenDark})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:`0 4px 16px ${C.greenGlow}`}}>🏠</div>
            <div>
              <div style={{color:C.text,fontWeight:700,fontSize:17,letterSpacing:"-0.5px",lineHeight:1}}>Patriva</div>
              <div style={{color:C.green,fontSize:10,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginTop:2}}>Tu asesor de seguros</div>
              <div style={{display:"flex",alignItems:"center",gap:5,marginTop:3}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:"#00e676",boxShadow:"0 0 6px #00e676"}}/>
                <span style={{color:C.textDim,fontSize:11}}>Asistente en línea</span>
              </div>
            </div>
          </div>
          <button onClick={reset} style={{background:"transparent",border:"1px solid #2a2a2a",borderRadius:8,color:C.textDim,fontSize:11,fontWeight:600,padding:"5px 11px",cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}} onMouseEnter={e=>{e.target.style.borderColor=C.border;e.target.style.color=C.textMid;}} onMouseLeave={e=>{e.target.style.borderColor="#2a2a2a";e.target.style.color=C.textDim;}}>Nueva consulta</button>
        </div>

        {/* MESSAGES */}

            {step==="cond_seguridad"&&<StepCondSeguridad onSubmit={onCondSeguridad}/>}
            {step==="cond_montos"&&<StepCondMontos onSubmit={onCondMontos}/>}
            {step==="contacto"&&<StepContacto onSubmit={onContacto}/>}
            {step==="ejecutivo"&&<StepEjecutivo onSubmit={onEjecutivo}/>}
            {step==="done"&&<div style={{animation:"fadeUp 0.3s ease",marginTop:4}}><ActionBtn onClick={reset} variant="secondary">Hacer otra consulta</ActionBtn></div>}
          </div>}
          <div ref={bottomRef}/>
        </div>


      </div>
    </div>
  </>;
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
